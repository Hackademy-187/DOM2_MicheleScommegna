<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fumetteria</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body class="imgbck">
    <h1 class="text-center my-3 text-light h1">Fumetteria</h1>

    <!-- Bottone toggle -->
    <div class="d-flex justify-content-end container">
      <button id="toggleBtn" class="btn btn-success my-3 rounded-5">
        <i class="bi bi-toggle-on"></i> Mostra/Nascondi
      </button>
    </div>

    <!-- INPUT -->
    <div class="container my-3">
      <input id="titolo" class="form-control my-2" placeholder="Titolo" />
      <input id="autore" class="form-control my-2" placeholder="Autore" />
      <input id="anno" class="form-control my-2" placeholder="Anno" />

      <button id="addBtn" class="btn btn-success">Aggiungi fumetto</button>
    </div>

    <!-- TABLE -->
    <div id="cntShell" class="container">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Titolo</th>
            <th>Autore</th>
            <th>Anno</th>
            <th>Azioni</th>
          </tr>
        </thead>

        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="./main.js"></script>
  </body>
</html>
